name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t somospye/pingou:${{ github.sha }} \
            -t somospye/pingou:latest \
            .

      - name: Push image
        run: |
          docker push somospye/pingou:${{ github.sha }}
          docker push somospye/pingou:latest
