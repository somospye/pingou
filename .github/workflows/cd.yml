name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t somospye/pingou:${{ github.sha }} \
            -t somospye/pingou:latest \
            .

      - name: Push image
        run: |
          docker push somospye/pingou:${{ github.sha }}
          docker push somospye/pingou:latest

      - name: Trigger homelab deploy
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          BODY=$(jq -n \
            --arg ref "refs/heads/main" \
            --arg sha "${{ github.sha }}" \
            --arg repo "${{ github.repository }}" \
            '{
              ref: $ref,
              after: $sha,
              repository: { full_name: $repo }
            }')

          SIG=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "$DEPLOY_SECRET" | sed 's/^.* //')

          curl -X POST "$DEPLOY_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$BODY"
